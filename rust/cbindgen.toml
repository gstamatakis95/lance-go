language = "C"
include_guard = "LANCE_GO_H"
autogen_warning = "/* WARNING: this file is auto-generated by cbindgen from rust/src. Do not edit by hand; run `make rust` to regenerate. */"
documentation = true
documentation_style = "c99"
cpp_compat = true
usize_is_size_t = true

# Canonical Arrow C Data Interface / C Stream Interface definitions (frozen
# spec: https://arrow.apache.org/docs/format/CDataInterface.html). Later waves
# pass these structs across the FFI boundary; the guards make the header
# compose with arrow headers or cgo-side definitions.
after_includes = """

#ifndef ARROW_C_DATA_INTERFACE
#define ARROW_C_DATA_INTERFACE

#define ARROW_FLAG_DICTIONARY_ORDERED 1
#define ARROW_FLAG_NULLABLE 2
#define ARROW_FLAG_MAP_KEYS_SORTED 4

struct ArrowSchema {
  /* Array type description */
  const char* format;
  const char* name;
  const char* metadata;
  int64_t flags;
  int64_t n_children;
  struct ArrowSchema** children;
  struct ArrowSchema* dictionary;

  /* Release callback */
  void (*release)(struct ArrowSchema*);
  /* Opaque producer-specific data */
  void* private_data;
};

struct ArrowArray {
  /* Array data description */
  int64_t length;
  int64_t null_count;
  int64_t offset;
  int64_t n_buffers;
  int64_t n_children;
  const void** buffers;
  struct ArrowArray** children;
  struct ArrowArray* dictionary;

  /* Release callback */
  void (*release)(struct ArrowArray*);
  /* Opaque producer-specific data */
  void* private_data;
};

#endif  /* ARROW_C_DATA_INTERFACE */

#ifndef ARROW_C_STREAM_INTERFACE
#define ARROW_C_STREAM_INTERFACE

struct ArrowArrayStream {
  int (*get_schema)(struct ArrowArrayStream*, struct ArrowSchema* out);
  int (*get_next)(struct ArrowArrayStream*, struct ArrowArray* out);
  const char* (*get_last_error)(struct ArrowArrayStream*);
  void (*release)(struct ArrowArrayStream*);
  void* private_data;
};

#endif  /* ARROW_C_STREAM_INTERFACE */
"""

[export]
# ErrorCode is not referenced by any exported signature (functions return a
# plain int32_t), so it must be exported explicitly for the Go side to use
# the ERROR_CODE_* constants.
include = ["ErrorCode"]
# The Arrow C interface structs are hand-written in after_includes above;
# never let cbindgen emit its own definitions for them.
exclude = ["ArrowSchema", "ArrowArray", "ArrowArrayStream"]

# The Arrow FFI types from the arrow crate map to the canonical C struct
# names defined in after_includes above.
[export.rename]
"FFI_ArrowSchema" = "struct ArrowSchema"
"FFI_ArrowArray" = "struct ArrowArray"
"FFI_ArrowArrayStream" = "struct ArrowArrayStream"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[parse]
parse_deps = false
